name: deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build React frontend
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "${PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy on VM
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          PUBLIC_DOMAIN: ${{ secrets.PUBLIC_DOMAIN }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='frontend/node_modules' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='.mypy_cache' \
            -czf - . | ssh -p "${PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -euo pipefail
            mkdir -p '${DEPLOY_APP_DIR}'
            tar -xzf - -C '${DEPLOY_APP_DIR}'
            cd '${DEPLOY_APP_DIR}'
            python3.11 -m venv .venv
            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -e .
            if [ ! -f .env ]; then cp .env.example .env; fi
            sudo systemctl restart crypto-mm
            rm -f /tmp/crypto-mm-health.json
            for i in 1 2 3 4 5; do
              if curl -fsS http://127.0.0.1:8015/api/state > /tmp/crypto-mm-health.json; then
                break
              fi
              sleep 2
            done
            test -s /tmp/crypto-mm-health.json
            echo 'deployed ' \"${PUBLIC_DOMAIN}\"
          "
